
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/adamchainz/djade-pre-commit
    rev: "1.3.2"
    hooks:
    -   id: djade
        args: [--target-version, "5.1"]  # Use current Django version

  - repo: https://github.com/twisted/towncrier
    rev: 24.8.0
    hooks:
      - id: towncrier-check

  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: "e732f664aa3fd7b32cce3de8abbac43f4c3c375d"  # frozen: 1.5.0
    hooks:
      - id: tox-ini-fmt
        args: [ "-p", "lint" ]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "57b6ff7bf72affdd12c7f3fd6de761ba18a33b3a"  # frozen: v2.5.1
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
      - id: ruff-format
        args:
          - --check

  - repo: https://github.com/saxix/pch
    rev: '4ae1ac5'
    hooks:
      - id: check-missed-migrations
        args:
          - src
        stages: [ pre-commit ]
        additional_dependencies: [ setuptools ]

      - id: check-untracked
        args:
          - src
          - tests
        stages: [ pre-push ]

      - id: check-minimized
        name: check missing minimized javascript
        files: (\.js)$
        exclude: (\.min\.js)$
